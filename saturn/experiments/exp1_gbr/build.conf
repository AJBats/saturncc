[dosbox]
memsize=16

[cpu]
cycles=max

[autoexec]
MOUNT S "C:\Users\albat\Downloads\saturn_compilers\DTS_1996\PROGRAM\GNUTOOLS"
MOUNT W "D:\Projects\SaturnCompiler\experiments\exp1_gbr"
SET PATH=S:\BIN
SET GCC_EXEC_PREFIX=S:\LIB\
SET C_INCLUDE_PATH=S:\INCLUDE
SET TMPDIR=W:\
SET GO32=EMU S:\BIN\EMU387
W:
DEL GCC_BASE.S
DEL GCC_REG.S
DEL BASE_ERR.TXT
DEL REG_ERR.TXT
GCC -x c -O2 -fomit-frame-pointer -S -o GCC_BASE.S GCC_TES1.C > BASE_LOG.TXT
GCC -x c -O2 -fomit-frame-pointer -S -o GCC_REG.S GCC_TES2.C > REG_LOG.TXT
EXIT
